name: Static Analysis

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      # ── Run cppcheck on all source directories ───────────────────────────────
      # --enable=all          : enable all check categories
      # --error-exitcode=1    : fail the workflow on any error (not warnings)
      # --inline-suppr        : allow // cppcheck-suppress comments in code
      # --suppress=missingInclude : ignore missing system headers (common in
      #                            cross-compiled code where stm32f4xx.h is
      #                            only available in the ARM sysroot)
      # -I                    : include paths so cppcheck resolves headers
      # Guarded: only pass -I paths that exist, and only scan source dirs
      # that actually contain a .c file — cppcheck errors out if given a
      # missing or empty path. Self-activates as bsp/app/bootloader/ml grow.
      - name: Run cppcheck
        run: |
          include_flags=()
          for dir in bsp/include app/include core/include ml/include; do
            [ -d "$dir" ] && include_flags+=("-I$dir")
          done

          src_dirs=()
          for dir in bsp/src app/src bootloader/src ml/src; do
            if [ -d "$dir" ] && find "$dir" -name '*.c' -print -quit | grep -q .; then
              src_dirs+=("$dir")
            fi
          done

          if [ ${#src_dirs[@]} -eq 0 ]; then
            echo "No source files yet — skipping cppcheck." | tee cppcheck_report.txt
          else
            cppcheck \
              --enable=all \
              --error-exitcode=1 \
              --inline-suppr \
              --suppress=missingInclude \
              --suppress=missingIncludeSystem \
              "${include_flags[@]}" \
              "${src_dirs[@]}" \
              2>&1 | tee cppcheck_report.txt
          fi

      - name: Upload cppcheck report
        if: always()    # upload even if cppcheck failed, so you can read it
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck_report.txt

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # tests/unity and tests/cmock are submodules,
                                   # needed by tests/CMakeLists.txt

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang \
            clang-tidy \
            cmake \
            ninja-build

      # clang-tidy needs a compile_commands.json to know exactly how each
      # file was compiled — include paths, defines, flags. CMake generates
      # this automatically with CMAKE_EXPORT_COMPILE_COMMANDS=ON.
      # We build for the host here because clang-tidy can't easily parse
      # ARM-targeted compile commands on an x86 runner without the full
      # ARM sysroot. The logic issues it catches are architecture-independent.
      - name: Generate compile_commands.json
        run: |
          cmake -B build/tidy \
                -DTARGET_PLATFORM=host \
                -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                -G Ninja

      # ── Run clang-tidy on all source files ───────────────────────────────────
      # run-clang-tidy is a wrapper script that runs clang-tidy in parallel
      # across all files listed in compile_commands.json.
      # -p points to the build directory containing compile_commands.json.
      - name: Run clang-tidy
        run: |
          run-clang-tidy \
            -p build/tidy \
            -header-filter='(bsp|app|ml|bootloader)/.*\.h' \
            2>&1 | tee clang_tidy_report.txt

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang_tidy_report.txt

  clang-format:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      # ── Check formatting without modifying files ─────────────────────────────
      # --dry-run  : don't write changes
      # --Werror   : exit with error if any file needs reformatting
      # This enforces that all committed code passes clang-format,
      # which the pre-commit hook should already guarantee locally.
      # Guarded: `find` errors out (and fails the pipeline under pipefail) if
      # any of these directories don't exist yet — only scan the ones that do.
      - name: Check formatting
        run: |
          dirs=()
          for d in bsp app bootloader ml core; do
            [ -d "$d" ] && dirs+=("$d")
          done

          files=$(find "${dirs[@]}" -name "*.c" -o -name "*.h")
          if [ -z "$files" ]; then
            echo "No C sources yet — nothing to format-check."
          else
            echo "$files" | xargs clang-format --dry-run --Werror
          fi

  doxygen:
    name: Doxygen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen graphviz

      # Run Doxygen and capture warnings
      # mkdir first: OUTPUT_DIRECTORY (build/docs) can't be created by
      # Doxygen itself since build/ doesn't exist yet in this job (no cmake
      # configure step runs here).
      - name: Run Doxygen
        run: |
          mkdir -p build/docs
          doxygen Doxyfile

      # Fail if there are any undocumented parameters or missing docs
      - name: Check for warnings
        run: |
          if [ -s build/docs/doxygen_warnings.txt ]; then
            echo "Doxygen warnings found:"
            cat build/docs/doxygen_warnings.txt
            exit 1
          fi

      # Upload the generated HTML as a CI artifact
      # You can browse it directly from the GitHub Actions run page
      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: build/docs/html/
